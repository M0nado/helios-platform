<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monado Control Center</title>
  <style>
    :root{color-scheme:dark;--ink:#e9fbff;--muted:#92aeba;--cyan:#55e5ff;--green:#66ffb3;--amber:#ffc857;--red:#ff6b7a;--panel:#0a1526}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% 0,#11365a 0,#07101d 42%,#03070d 100%);color:var(--ink);font:14px Inter,system-ui,sans-serif}
    main{max-width:920px;margin:auto;padding:24px}.eyebrow{color:var(--cyan);letter-spacing:.16em;text-transform:uppercase}.head{display:flex;align-items:end;justify-content:space-between;gap:16px}h1{margin:.25em 0;font-size:clamp(28px,6vw,50px)}button{border:1px solid #2fa4c1;background:#0c2b3c;color:var(--ink);border-radius:10px;padding:10px 14px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-top:18px}.card{min-height:155px;padding:16px;border:1px solid #193d53;border-radius:16px;background:linear-gradient(145deg,#0d1b30dd,#08111ddd);box-shadow:0 15px 45px #0006}.name{font-size:18px;font-weight:750}.state{display:inline-block;margin:12px 0 8px;border-radius:99px;padding:4px 9px;font-size:12px;background:#ffffff10}.connected,.configured{color:var(--green)}.needs_configuration{color:var(--amber)}.blocked{color:var(--red)}.muted{color:var(--muted);line-height:1.4}a{color:var(--cyan)}
  </style>
</head>
<body><main><div class="head"><div><div class="eyebrow">HELIOS · HERMES XCORE</div><h1>Monado Control Center</h1></div><button id="refresh">Refresh fabric</button></div><p class="muted" id="stamp">Waiting for control-plane data…</p><section class="grid" id="grid"></section></main>
<script>
  const grid=document.getElementById('grid'), stamp=document.getElementById('stamp');
  function node(tag,className,text){const value=document.createElement(tag);if(className)value.className=className;if(text!==undefined)value.textContent=String(text);return value}
  function safeHttpsUrl(value){try{const url=new URL(value);return url.protocol==='https:'?url.href:null}catch{return null}}
  function render(data){
    const systems=Array.isArray(data?.systems)?data.systems:[];
    stamp.textContent=`Fabric ${data?.version||''} · ${data?.generatedAt||'live'}`;
    grid.replaceChildren();
    for(const system of systems){
      const state=['connected','configured','needs_configuration','blocked'].includes(system?.state)?system.state:'needs_configuration';
      const card=node('article','card');
      card.append(node('div','name',system?.name||'Unknown system'));
      card.append(node('div',`state ${state}`,state.replaceAll('_',' ')));
      card.append(node('div','muted',system?.purpose||''));
      card.append(node('p','muted',system?.nextAction||''));
      const href=safeHttpsUrl(system?.url);
      if(href){const link=node('a','', 'Open system ↗');link.href=href;link.target='_blank';link.rel='noreferrer';card.append(link)}
      grid.append(card);
    }
  }
  window.addEventListener('message',e=>{const m=e.data;if(m?.jsonrpc==='2.0'&&m.method==='ui/notifications/tool-result')render(m.params?.structuredContent)});
  if(window.openai?.toolOutput)render(window.openai.toolOutput);
  document.getElementById('refresh').onclick=async()=>{if(window.openai?.callTool){const r=await window.openai.callTool('get_control_plane_status',{});render(r?.structuredContent||r)}else{window.parent.postMessage({jsonrpc:'2.0',id:Date.now(),method:'tools/call',params:{name:'get_control_plane_status',arguments:{}}},'*')}};
</script></body></html>
