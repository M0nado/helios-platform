name: HELIOS nightly health

'on':
  schedule:
    - cron: '33 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate static control plane
        run: |
          python -m pip install -e '.[test]'
          fabricctl validate --root . > health-validation.json
      - name: Probe broker when enabled
        if: ${{ vars.HELIOS_FABRIC_ENABLED == 'true' }}
        env:
          URL: ${{ vars.HELIOS_FABRIC_INGRESS_URL }}
        run: |
          curl --fail --silent --show-error --max-time 10 "$URL/health/ready" > broker-health.json
      - name: Build digest artifact
        run: |
          python - <<'PY'
          import json, pathlib
          payload={'validation':json.load(open('health-validation.json'))}
          p=pathlib.Path('broker-health.json')
          payload['broker']=json.load(open(p)) if p.exists() else {'status':'not-enabled'}
          json.dump(payload,open('health-digest.json','w'),indent=2)
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: helios-health-digest
          path: health-digest.json
          retention-days: 30
