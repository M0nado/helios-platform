name: HELIOS broker images

'on':
  push:
    branches: [main]
    paths:
      - 'src/dotnet/**'
      - 'config/fabric/**'
      - 'docker/**'
      - '.github/workflows/broker-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [broker, worker]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/helios-fabric-${{ matrix.component }}
          tags: |
            type=sha,format=long
            type=raw,value=2.0.0
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.component }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/helios-fabric-${{ matrix.component }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
