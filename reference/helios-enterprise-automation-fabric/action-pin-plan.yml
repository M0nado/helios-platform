name: HELIOS action pin plan

'on':
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact 40-character reviewed source SHA
        required: true
        type: string
      build_patch:
        description: Resolve tags and build a reviewed SHA-pinning patch artifact
        required: true
        type: boolean
        default: true
      confirmation:
        description: Type PIN HELIOS GITHUB ACTIONS when build_patch is true
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: helios-action-pin-plan-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
    steps:
      - name: Validate source SHA
        shell: bash
        run: '[[ "$SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]'
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Enforce exact source SHA
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Resolve approved action tags
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python scripts/github/pin_actions.py --root . --output artifacts/action-pin-plan.json
      - name: Build reviewed patch snapshot
        if: ${{ inputs.build_patch }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CONFIRMATION: ${{ inputs.confirmation }}
        shell: bash
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = 'PIN HELIOS GITHUB ACTIONS'
          python scripts/github/pin_actions.py \
            --root . \
            --apply \
            --confirm 'PIN HELIOS GITHUB ACTIONS' \
            --output artifacts/action-pins.lock.json
          git diff -- .github/workflows config/github/action-pins.lock.json > artifacts/action-pins.patch
          PYTHONPATH=src python -m helios_fabric.cli validate --root .
          tar -czf artifacts/pinned-workflows.tar.gz .github/workflows config/github/action-pins.lock.json
          sha256sum artifacts/action-pins.patch artifacts/pinned-workflows.tar.gz > artifacts/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: action-pin-plan-${{ inputs.source_sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 30
