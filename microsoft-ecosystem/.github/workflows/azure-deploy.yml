name: Deploy HELIOS to Azure

on:
  push:
    branches:
      - main
      - release/*
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/helios-platform

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build deployment package
        run: |
          dotnet publish ./src/core/HELIOS.Platform.Minimal/HELIOS.Platform.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output ./build/app
          cd ./build/app
          zip -r ../app.zip .

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: helios-app-package
          path: ./build/app.zip
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Pester tests
        run: |
          pwsh -Command "
            Install-Module Pester -Force
            Invoke-Pester -Path ./tests -Verbose
          "

      - name: Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    environment: staging
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_DEPLOYMENT_ENVIRONMENT: staging
      AZURE_RESOURCE_GROUP: helios-platform-staging
      AZURE_WEBAPP_NAME: helios-app-staging
      AZURE_HEALTH_BASE_URL: https://helios-app-staging.azurewebsites.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: helios-app-package
          path: ./build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group $AZURE_RESOURCE_GROUP \
            --template-file ./infrastructure/main.bicep \
            --parameters environment=$AZURE_DEPLOYMENT_ENVIRONMENT

      - name: Deploy application
        run: |
          az webapp deployment source config-zip \
            --resource-group $AZURE_RESOURCE_GROUP \
            --name $AZURE_WEBAPP_NAME \
            --src-path ./build/app.zip

      - name: Run smoke tests
        run: |
          curl -f "$AZURE_HEALTH_BASE_URL/health" || exit 1

      - name: Notify Teams
        if: success()
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URI }}
          notification-color: 28a745
          title: 'HELIOS Deployment to Staging'
          fields: 'Actor,Branch,Commit Message'

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: production
    permissions:
      contents: write
      id-token: write
    env:
      AZURE_DEPLOYMENT_ENVIRONMENT: production
      AZURE_RESOURCE_GROUP: helios-platform-prod
      AZURE_WEBAPP_NAME: helios-app-prod
      AZURE_HEALTH_BASE_URL: https://helios-app-prod.azurewebsites.net
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: helios-app-package
          path: ./build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create deployment approval
        id: approval
        run: |
          echo "Waiting for production deployment approval..."
          # This step would integrate with your approval workflow
          echo "approved=true" >> $GITHUB_OUTPUT

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group $AZURE_RESOURCE_GROUP \
            --template-file ./infrastructure/main.bicep \
            --parameters environment=$AZURE_DEPLOYMENT_ENVIRONMENT

      - name: Deploy application
        run: |
          az webapp deployment source config-zip \
            --resource-group $AZURE_RESOURCE_GROUP \
            --name $AZURE_WEBAPP_NAME \
            --src-path ./build/app.zip

      - name: Update Azure Monitor alerts
        run: |
          az monitor alert create \
            --resource-group $AZURE_RESOURCE_GROUP \
            --name helios-alerts \
            --description "HELIOS Platform production alerts"

      - name: Run health checks
        run: |
          curl -f "$AZURE_HEALTH_BASE_URL/health" || exit 1
          curl -f "$AZURE_HEALTH_BASE_URL/api/status" || exit 1

      - name: Update status dashboard
        run: |
          pwsh -Command "
            # Update Power BI dataset
            Invoke-WebRequest -Uri '${{ secrets.POWERBI_WEBHOOK_URI }}' `
              -Method Post `
              -Body @{status='deployed'; version='${{ github.sha }}'} | Out-Null
          "

      - name: Notify Teams (Production Deployment)
        if: success()
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URI_PROD }}
          notification-color: 007bff
          title: 'HELIOS Deployment to Production'
          fields: 'Actor,Branch,Commit Message,Deployment Status'

      - name: Create release notes
        if: success()
        run: |
          gh release create ${{ github.ref_name }} \
            --notes "Production deployment of HELIOS Platform" \
            --title "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: [build, test]
    environment: staging

    steps:
      - name: Notify of failure
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URI }}
          notification-color: dc3545
          title: 'HELIOS Deployment Failed'
          fields: 'Actor,Branch,Commit Message'

      - name: Create incident ticket
        run: |
          echo "Incident created for failed deployment"
          # Integration with your ticketing system

  performance-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always()

    steps:
      - name: Run performance tests
        run: |
          echo "Running performance benchmarks..."
          # Run load testing, response time tests, etc.

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: ./perf-results/
