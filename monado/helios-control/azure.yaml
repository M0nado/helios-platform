name: helios-control
metadata:
  template: helios-microsoft-agent-fabric@0.1.0
requiredVersions:
  azd: '>= 1.25.3'
infra:
  provider: bicep
  path: infra
# azd is an authenticated preview/inspection client only. The service stanza is
# deliberately omitted so `azd deploy` cannot bypass the protected GitHub
# what-if and deploy environments. Image publication uses ACR Tasks through the
# interactive wizard; application deployment uses helios-cloud-deploy.yml.
hooks:
  preprovision:
    shell: pwsh
    run: ./scripts/Bootstrap-MicrosoftToolchain.ps1 -Mode Verify
