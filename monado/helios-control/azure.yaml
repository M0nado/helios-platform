name: helios-control
metadata:
  template: helios-microsoft-agent-fabric@0.3.0
requiredVersions:
  azd: '>= 1.25.3'
infra:
  provider: bicep
  # Direct azd provisioning is intentionally retired. Even when hooks are
  # skipped, this guard module contains no Helios resources and fails apply.
  path: infra/azd-guard
# azd remains available for authentication and environment inspection only.
# Helios preview and deployment use the reviewed scripts and protected
# helios-cloud-deploy.yml workflow against infra/main.bicep.
hooks:
  preprovision:
    shell: pwsh
    run: |
      Write-Error 'Direct azd provisioning is disabled. Use scripts/Invoke-HeliosProvisionPreview.ps1 for local what-if or the protected helios-cloud-deploy workflow for deployment.'
      exit 1
