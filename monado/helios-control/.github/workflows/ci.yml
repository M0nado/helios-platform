name: helios-connect-ci

on:
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - monado/helios-control/**
      - src/**
      - tests/**
      - Helios.Connect.sln
  push:
    branches: [main, master]
    paths:
      - .github/workflows/ci.yml
      - monado/helios-control/**
      - src/**
      - tests/**
      - Helios.Connect.sln

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Locate Helios project
        id: project
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "Helios.Connect.sln" ]]; then
            directory="."
          elif [[ -f "monado/helios-control/Helios.Connect.sln" ]]; then
            directory="monado/helios-control"
          else
            echo "Helios.Connect.sln was not found." >&2
            exit 1
          fi
          echo "directory=${directory}" >> "${GITHUB_OUTPUT}"

      - name: Set up pinned .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.423

      - name: Restore
        run: dotnet restore "${{ steps.project.outputs.directory }}/Helios.Connect.sln"

      - name: Test
        run: dotnet test "${{ steps.project.outputs.directory }}/Helios.Connect.sln" --no-restore --configuration Release
