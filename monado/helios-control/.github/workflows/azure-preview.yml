name: helios-azure-preview
on:
  pull_request:
    paths:
      - 'monado/helios-control/infra/**'
      - 'monado/helios-control/azure.yaml'
permissions:
  contents: read
  id-token: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: az bicep install
      - run: az bicep build --file monado/helios-control/infra/main.bicep
  what-if:
    if: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_RESOURCE_GROUP != '' && vars.HELIOS_ENTRA_CLIENT_ID != '' && vars.HELIOS_ALLOWED_PRINCIPAL_OBJECT_ID != '' }}
    needs: validate
    runs-on: ubuntu-latest
    environment: azure-preview
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - run: az bicep install
      - run: >-
          az deployment group what-if
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --template-file monado/helios-control/infra/main.bicep
          --parameters
          environmentName=preview
          entraClientId="${{ vars.HELIOS_ENTRA_CLIENT_ID }}"
          entraTenantId="${{ vars.AZURE_TENANT_ID }}"
          allowedPrincipalObjectId="${{ vars.HELIOS_ALLOWED_PRINCIPAL_OBJECT_ID }}"
