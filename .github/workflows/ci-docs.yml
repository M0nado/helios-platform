name: CI - Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/docs/**'
      - '.github/workflows/ci-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate links
        shell: pwsh
        run: ./scripts/docs/validate-links.ps1
