name: .NET Core Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-build.yml'
      - '**.csproj'
      - '**.sln*'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/dotnet-build.yml'
      - '**.csproj'
      - '**.sln*'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_MULTILEVEL_LOOKUP: false

jobs:
  build-core:
    name: Build cross-platform core/CLI/contracts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - src/core/HELIOS.Platform.Contracts/HELIOS.Platform.Contracts.csproj
          - src/core/HELIOS.Platform.Minimal/HELIOS.Platform.csproj
          - src/core/HELIOS.Platform/HELIOS.Platform.csproj
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/core/**/*.csproj', 'src/tests/**/*.csproj', 'tests/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-
            nuget-

      - name: Display .NET Information
        run: |
          echo "=== .NET Environment ==="
          dotnet --version
          dotnet --list-sdks
          dotnet --list-runtimes
          echo "========================"

      - name: Restore ${{ matrix.project }}
        run: dotnet restore "${{ matrix.project }}"

      - name: Build ${{ matrix.project }}
        run: |
          dotnet build "${{ matrix.project }}" \
            --configuration Release \
            --no-restore \
            -p:TreatWarningsAsErrors=false \
            -p:PublishReadyToRun=false

  publish-cli:
    name: Publish cross-platform CLI
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore CLI
        run: dotnet restore src/core/HELIOS.Platform/HELIOS.Platform.csproj

      - name: Publish CLI
        run: |
          dotnet publish src/core/HELIOS.Platform/HELIOS.Platform.csproj \
            --configuration Release \
            --output ./publish/core-cli \
            --no-restore \
            -p:TreatWarningsAsErrors=false \
            -p:PublishReadyToRun=false

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: helios-core-cli
          path: ./publish/core-cli/
          if-no-files-found: error
          retention-days: 5

  test-unit:
    name: Unit Tests
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/core/**/*.csproj', 'src/tests/**/*.csproj', 'tests/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-
            nuget-

      - name: Run Unit Tests
        run: |
          if [ -f src/tests/HELIOS.Platform.Tests/HELIOS.Platform.Tests.csproj ]; then
            dotnet test src/tests/HELIOS.Platform.Tests/HELIOS.Platform.Tests.csproj \
              --configuration Release \
              --logger "trx;LogFileName=unit-test-results.trx" \
              --logger "console;verbosity=minimal" \
              -v minimal
          else
            echo "No src/tests/HELIOS.Platform.Tests project found; skipping."
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: '**/unit-test-results.trx'
          if-no-files-found: warn
          retention-days: 5

  code-analysis:
    name: Core Code Quality & Security
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check .NET Package Vulnerabilities
        run: |
          dotnet list src/core/HELIOS.Platform/HELIOS.Platform.csproj package --vulnerable
          dotnet list src/core/HELIOS.Platform.Contracts/HELIOS.Platform.Contracts.csproj package --vulnerable
        continue-on-error: true

  test-results:
    name: Publish Test Results
    if: always()
    needs: [test-unit]
    runs-on: ubuntu-latest
    steps:
      - name: Download Test Artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/**/*.trx
          check_name: .NET Core Test Results
          comment_mode: off
        continue-on-error: true

      - name: Generate Report
        if: always()
        run: |
          echo "## .NET Core Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.test-unit.result }}" >> $GITHUB_STEP_SUMMARY

  final-status:
    name: Linux Core Final Gate
    if: always()
    needs: [build-core, publish-cli, test-unit, code-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Check Linux core gate status
        run: |
          BUILD_STATUS="${{ needs.build-core.result }}"
          PUBLISH_STATUS="${{ needs.publish-cli.result }}"
          UNIT_STATUS="${{ needs.test-unit.result }}"
          ANALYSIS_STATUS="${{ needs.code-analysis.result }}"

          echo "## Linux Core CI/CD Status"
          echo "Core/CLI/Contracts Build: $BUILD_STATUS"
          echo "CLI Publish: $PUBLISH_STATUS"
          echo "Unit Tests: $UNIT_STATUS"
          echo "Code Analysis: $ANALYSIS_STATUS"

          if [ "$BUILD_STATUS" = "success" ] && [ "$PUBLISH_STATUS" = "success" ] && [ "$UNIT_STATUS" = "success" ]; then
            echo "✅ Linux final gate passed for cross-platform C# core/CLI/contracts"
            exit 0
          fi

          echo "❌ Linux final gate failed for cross-platform C# core/CLI/contracts"
          exit 1

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ needs.build-core.result }}' === 'success' && '${{ needs.publish-cli.result }}' === 'success' && '${{ needs.test-unit.result }}' === 'success';
            const status = ok ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${status} .NET Core Linux Final Gate\n\n**Core/CLI/Contracts Build**: ${{ needs.build-core.result }}\n**CLI Publish**: ${{ needs.publish-cli.result }}\n**Unit Tests**: ${{ needs.test-unit.result }}\n**Code Analysis**: ${{ needs.code-analysis.result }}\n\nWindows WPF/WinUI shell builds run separately in the Windows Shell Build workflow.\n\n[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
