name: Code Checks - HELIOS Platform v2

on:
  push:
    branches: [main, develop]
    paths:
      - '**.ps1'
      - '**.bat'
      - '**.cmd'
      - 'config/powershell-syntax-baseline.json'
      - '.github/workflows/code-checks.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.ps1'
      - '**.bat'
      - '**.cmd'
      - 'config/powershell-syntax-baseline.json'
      - '.github/workflows/code-checks.yml'

jobs:
  code-checks:
    name: Automated Code Quality Checks
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PowerShell
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion

      - name: Canonical PowerShell syntax policy
        id: syntax-check
        shell: pwsh
        run: ./scripts/validation/Test-PowerShellSyntax.ps1

      - name: Security scanning
        id: security-scan
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Filter '*.ps1' -File -Recurse -ErrorAction Stop
          $securityIssues = [System.Collections.Generic.List[object]]::new()
          $patternMap = [ordered]@{
            'password\s*=\s*[''"][^''"]*[''"]' = 'Hardcoded password'
            'apikey\s*=\s*[''"][^''"]*[''"]' = 'Hardcoded API key'
            'secret\s*=\s*[''"][^''"]*[''"]' = 'Hardcoded secret'
            'token\s*=\s*[''"][^''"]*[''"]' = 'Hardcoded token'
          }

          foreach ($file in $files) {
            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction Stop
            if ($file.Name -match '^test-' -or $content -match '# EXAMPLE CODE') {
              continue
            }

            foreach ($pattern in $patternMap.Keys) {
              if ($content -match $pattern) {
                $securityIssues.Add([pscustomobject]@{
                  Path = [IO.Path]::GetRelativePath($PWD.Path, $file.FullName)
                  Issue = $patternMap[$pattern]
                })
              }
            }
          }

          if ($securityIssues.Count -gt 0) {
            Write-Host '::warning::Potential security issues found by heuristic scanning.'
            $securityIssues | Sort-Object Path, Issue -Unique | ForEach-Object {
              Write-Host "  - $($_.Path): $($_.Issue)"
            }
            Write-Host '::notice::Keyword-only matches are review warnings and do not fail this workflow.'
          } else {
            Write-Host 'No hardcoded-secret keyword patterns detected.' -ForegroundColor Green
          }

      - name: Registry modification validation for active scripts
        id: registry-check
        shell: pwsh
        run: |
          $baseline = Get-Content -LiteralPath 'config/powershell-syntax-baseline.json' -Raw | ConvertFrom-Json
          $legacyPaths = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          foreach ($entry in $baseline.entries) {
            if (-not [bool]$entry.blocking) {
              $null = $legacyPaths.Add(([string]$entry.path).Replace('\', '/'))
            }
          }

          $issueCount = 0
          $activeCount = 0
          $files = Get-ChildItem -Path . -Filter '*.ps1' -File -Recurse -ErrorAction Stop
          foreach ($file in $files) {
            $relative = [IO.Path]::GetRelativePath($PWD.Path, $file.FullName).Replace('\', '/')
            if ($legacyPaths.Contains($relative)) {
              continue
            }

            $activeCount++
            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction Stop
            if ($content -match '(New-Item|Set-ItemProperty|Remove-Item).*?(HKLM:|HKCU:|HKU:)') {
              if ($content -notmatch '#\s*Registry:') {
                Write-Host "::error file=$relative::Registry mutation is missing a '# Registry:' rationale and rollback note."
                $issueCount++
              }
            }
          }

          Write-Host "Registry policy checked $activeCount active PowerShell files; legacy baseline files were explicitly classified, not silently skipped."
          if ($issueCount -gt 0) {
            throw "Registry documentation validation failed for $issueCount active file(s)."
          }

      - name: File path warnings
        id: path-check
        shell: pwsh
        run: |
          $warnings = [System.Collections.Generic.List[string]]::new()
          $files = Get-ChildItem -Path . -Filter '*.ps1' -File -Recurse -ErrorAction Stop
          foreach ($file in $files) {
            $relative = [IO.Path]::GetRelativePath($PWD.Path, $file.FullName)
            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction Stop
            if ($file.Name -notmatch '^test-' -and $content -match '[''"]C:\\Users\\[^''"]*[''"]') {
              $warnings.Add("$relative: hardcoded user profile path")
            }
          }

          if ($warnings.Count -gt 0) {
            Write-Host '::warning::Path portability warnings:'
            $warnings | Sort-Object -Unique | ForEach-Object { Write-Host "  - $_" }
          } else {
            Write-Host 'No hardcoded user-profile paths detected.' -ForegroundColor Green
          }

      - name: Documentation validation for active phase scripts
        id: doc-check
        shell: pwsh
        run: |
          $baseline = Get-Content -LiteralPath 'config/powershell-syntax-baseline.json' -Raw | ConvertFrom-Json
          $legacyPaths = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          foreach ($entry in $baseline.entries) {
            if (-not [bool]$entry.blocking) {
              $null = $legacyPaths.Add(([string]$entry.path).Replace('\', '/'))
            }
          }

          $issues = 0
          $phaseFiles = Get-ChildItem -Path . -Filter 'Phase-*.ps1' -File -Recurse -ErrorAction Stop
          foreach ($file in $phaseFiles) {
            $relative = [IO.Path]::GetRelativePath($PWD.Path, $file.FullName).Replace('\', '/')
            if ($legacyPaths.Contains($relative)) {
              continue
            }

            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction Stop
            $complete = $content -match '<#' -and $content -match '\.SYNOPSIS' -and $content -match '\.DESCRIPTION'
            if (-not $complete) {
              Write-Host "::error file=$relative::Active phase script is missing comment-based help (.SYNOPSIS and .DESCRIPTION)."
              $issues++
            }
          }

          if ($issues -gt 0) {
            throw "Documentation validation failed for $issues active phase script(s)."
          }

      - name: Run PowerShell unit tests when present
        id: unit-tests
        shell: pwsh
        run: |
          $testFiles = Get-ChildItem -Path . -Filter 'test-*-unit.ps1' -File -Recurse -ErrorAction Stop
          if ($testFiles.Count -eq 0) {
            Write-Host 'No PowerShell unit tests found.'
            exit 0
          }

          Install-Module -Name Pester -RequiredVersion 5.4.0 -Force -SkipPublisherCheck -Scope CurrentUser
          $failed = 0
          foreach ($testFile in $testFiles) {
            $result = Invoke-Pester -Path $testFile.FullName -PassThru
            $failed += $result.FailedCount
          }

          if ($failed -gt 0) {
            throw "$failed PowerShell unit test(s) failed."
          }

      - name: Generate summary
        if: always()
        shell: pwsh
        run: |
          @"
          ## HELIOS PowerShell code checks

          - Canonical syntax policy: ${{ steps.syntax-check.outcome }}
          - Security heuristics: ${{ steps.security-scan.outcome }}
          - Active registry policy: ${{ steps.registry-check.outcome }}
          - Path portability: ${{ steps.path-check.outcome }}
          - Active phase documentation: ${{ steps.doc-check.outcome }}
          - PowerShell unit tests: ${{ steps.unit-tests.outcome }}
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
