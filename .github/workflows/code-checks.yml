name: Code Checks - HELIOS Platform v2

on:
  push:
    branches: [main, develop]
    paths:
      - '**.ps1'
      - '**.bat'
      - '**.cmd'
      - '.github/workflows/code-checks.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.ps1'
      - '**.bat'
      - '**.cmd'
      - '.github/workflows/code-checks.yml'

permissions:
  contents: read

jobs:
  code-checks:
    name: Automated Code Quality Checks
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve changed PowerShell files
        id: changed-files
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          if ($env:EVENT_NAME -eq 'pull_request') {
            if ([string]::IsNullOrWhiteSpace($env:BASE_REF)) {
              throw 'Pull request base ref is unavailable.'
            }
            git fetch origin $env:BASE_REF --depth=1
            $paths = @(git diff --name-only --diff-filter=ACMR "origin/$env:BASE_REF...HEAD")
          }
          elseif ($env:BEFORE_SHA -and $env:BEFORE_SHA -notmatch '^0+$') {
            $paths = @(git diff --name-only --diff-filter=ACMR $env:BEFORE_SHA HEAD)
          }
          else {
            $paths = @(git diff-tree --no-commit-id --name-only -r HEAD)
          }

          $files = @(
            $paths |
              Where-Object { $_ -match '\.ps1$' -and (Test-Path -LiteralPath $_ -PathType Leaf) } |
              Sort-Object -Unique
          )

          $manifest = Join-Path $env:RUNNER_TEMP 'changed-powershell-files.json'
          $files | ConvertTo-Json -Compress | Set-Content -LiteralPath $manifest -Encoding utf8NoBOM
          "manifest=$manifest" >> $env:GITHUB_OUTPUT
          "count=$($files.Count)" >> $env:GITHUB_OUTPUT

          Write-Host "Changed PowerShell files: $($files.Count)"
          $files | ForEach-Object { Write-Host "  - $_" }

      - name: PowerShell syntax validation
        id: syntax-check
        shell: pwsh
        env:
          MANIFEST: ${{ steps.changed-files.outputs.manifest }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $files = @(Get-Content -LiteralPath $env:MANIFEST -Raw | ConvertFrom-Json)
          $issues = @()

          foreach ($path in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $path).Path,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              foreach ($errorRecord in $errors) {
                $issues += "${path}:$($errorRecord.Extent.StartLineNumber): $($errorRecord.Message)"
              }
            }
            else {
              Write-Host "✓ $path"
            }
          }

          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Security scanning
        id: security-scan
        shell: pwsh
        env:
          MANIFEST: ${{ steps.changed-files.outputs.manifest }}
        run: |
          Set-StrictMode -Version Latest
          $files = @(Get-Content -LiteralPath $env:MANIFEST -Raw | ConvertFrom-Json)
          $patterns = [ordered]@{
            '(?i)password\s*=\s*[''"][^''"]+[''"]' = 'Hardcoded password'
            '(?i)apikey\s*=\s*[''"][^''"]+[''"]' = 'Hardcoded API key'
            '(?i)secret\s*=\s*[''"][^''"]+[''"]' = 'Hardcoded secret'
            '(?i)token\s*=\s*[''"][^''"]+[''"]' = 'Hardcoded token'
            'github_pat_[A-Za-z0-9_]{20,}' = 'GitHub personal access token'
            'sk-[A-Za-z0-9_-]{20,}' = 'Provider API key'
          }
          $issues = @()

          foreach ($path in $files) {
            $content = Get-Content -LiteralPath $path -Raw
            if ($content -match '# EXAMPLE CODE') { continue }
            foreach ($pattern in $patterns.Keys) {
              if ($content -match $pattern) {
                $issues += "${path}: $($patterns[$pattern])"
              }
            }
          }

          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Registry modification validation
        id: registry-check
        shell: pwsh
        env:
          MANIFEST: ${{ steps.changed-files.outputs.manifest }}
        run: |
          Set-StrictMode -Version Latest
          $files = @(Get-Content -LiteralPath $env:MANIFEST -Raw | ConvertFrom-Json)
          $mutationPattern = '(?is)\b(New-Item|Set-ItemProperty|Remove-Item|New-ItemProperty|Remove-ItemProperty)\b[^\r\n]*(Registry::HKEY_|HKLM:|HKCU:|HKU:)'
          $issues = @()

          foreach ($path in $files) {
            $content = Get-Content -LiteralPath $path -Raw
            if ($content -match $mutationPattern) {
              if ($content -notmatch '(?im)^\s*#\s*Registry:') {
                $issues += "${path}: missing '# Registry:' documentation for a registry mutation"
              }
              else {
                Write-Host "✓ $path registry mutation is documented"
              }
            }
          }

          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: File path validation
        id: path-check
        shell: pwsh
        env:
          MANIFEST: ${{ steps.changed-files.outputs.manifest }}
        run: |
          Set-StrictMode -Version Latest
          $files = @(Get-Content -LiteralPath $env:MANIFEST -Raw | ConvertFrom-Json)
          $warnings = @()

          foreach ($path in $files) {
            $content = Get-Content -LiteralPath $path -Raw
            if ($path -notmatch '(?i)test-' -and $content -match '[''"]C:\\Users\\[^''"]*[''"]') {
              $warnings += "${path}: hard-coded user profile path"
            }
          }

          $warnings | ForEach-Object { Write-Warning $_ }

      - name: Documentation check
        id: doc-check
        shell: pwsh
        env:
          MANIFEST: ${{ steps.changed-files.outputs.manifest }}
        run: |
          Set-StrictMode -Version Latest
          $files = @(Get-Content -LiteralPath $env:MANIFEST -Raw | ConvertFrom-Json)
          $phaseFiles = @($files | Where-Object { [IO.Path]::GetFileName($_) -match '^Phase-.*\.ps1$' })
          $issues = @()

          foreach ($path in $phaseFiles) {
            $content = Get-Content -LiteralPath $path -Raw
            if ($content -notmatch '<#' -or $content -notmatch '\.SYNOPSIS' -or $content -notmatch '\.DESCRIPTION') {
              $issues += "${path}: missing comment-based help"
            }
          }

          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Success message
        if: success()
        shell: pwsh
        run: |
          Write-Host 'All changed-file code checks passed.'
