name: Module Boundaries Validation

on:
  pull_request:
    paths:
      - 'docs/architecture/REPOSITORY_MODULE_MAP.md'
      - 'config/repository/module-boundaries.v1.json'
      - '.github/workflows/module-boundaries-validate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate module boundary manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('config/repository/module-boundaries.v1.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          assert data['schemaVersion'] == 1
          assert data['canonicalRepository'] == 'M0nado/helios-platform'
          ids = [m['id'] for m in data['modules']]
          assert len(ids) == len(set(ids)), 'duplicate module ids'
          assert any(m['id'] == 'legacy' and m.get('runtimeImportAllowed') is False for m in data['modules'])
          assert data['mergePolicy']['directToMain'] is False
          assert data['mergePolicy']['expectedHeadShaRequired'] is True
          assert data['submodulePolicy']['defaultAllowed'] is False
          print(f'Validated {len(ids)} module boundaries')
          PY
