name: Documentation Update & Wiki Generation

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.ps1'
      - 'docs/**'
      - 'phases/**'
      - '.github/workflows/documentation-update.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-indexes:
    runs-on: ubuntu-latest
    name: Update Documentation Indexes
    steps:
      - uses: actions/checkout@v4

      - name: Generate Documentation Indexes
        shell: pwsh
        run: |
          Write-Host "Generating documentation indexes..." -ForegroundColor Cyan

          $indexLines = @(
            '# Documentation Index',
            '',
            '## Getting Started',
            '- [README.md](../README.md)',
            '- [00-KICKOFF-START-HERE.md](../00-KICKOFF-START-HERE.md)',
            '- [GETTING_STARTED.md](../GETTING_STARTED.md)',
            '',
            '## Architecture',
            '- [MODULAR_ARCHITECTURE.md](../MODULAR_ARCHITECTURE.md)',
            '- [ARCHITECTURE.md](./ARCHITECTURE.md)',
            '',
            '## Phases'
          )

          if (Test-Path phases) {
            Get-ChildItem -Path phases -Directory | ForEach-Object {
              $relativePath = $_.FullName.Replace((Get-Location).Path, '').TrimStart([IO.Path]::DirectorySeparatorChar).Replace('\\', '/')
              $indexLines += "- [$($_.Name)](../$relativePath)"
            }
          }

          New-Item -ItemType Directory -Force -Path docs | Out-Null
          $indexLines | Out-File -FilePath docs/INDEX.md -Encoding UTF8
          Write-Host "✅ Documentation indexes updated" -ForegroundColor Green

  validate-links:
    runs-on: ubuntu-latest
    name: Validate Documentation Links
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown Links
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for broken markdown links..."
          find . -path './.git' -prune -o -name '*.md' -type f -print | while read -r file; do
            echo "Checking: $file"
            grep -o '\[.*\](.*\.md)' "$file" | sed 's/.*(\(.*\))/\1/' | while read -r link; do
              target="$link"
              case "$target" in
                http://*|https://*|'') continue ;;
                /*) ;;
                *) target="$(dirname "$file")/$target" ;;
              esac
              if [ ! -f "$target" ]; then
                echo "⚠️  Potentially broken link in $file: $link"
              fi
            done || true
          done
          echo "Link validation complete"

  generate-wiki:
    runs-on: ubuntu-latest
    name: Generate Wiki Documentation
    steps:
      - uses: actions/checkout@v4

      - name: Generate Wiki Pages
        shell: pwsh
        run: |
          Write-Host "Generating wiki documentation..." -ForegroundColor Cyan

          $wikiLines = @('# HELIOS Platform Wiki', '', '## Phases', '')
          if (Test-Path phases) {
            Get-ChildItem -Path phases -Directory | ForEach-Object {
              $phaseNum = $_.Name.Split('-')[0]
              $phaseName = if ($_.Name.Length -gt 2) { $_.Name.Substring(2) } else { $_.Name }
              $relativePath = $_.FullName.Replace((Get-Location).Path, '').TrimStart([IO.Path]::DirectorySeparatorChar).Replace('\\', '/')
              $wikiLines += "- **Phase $phaseNum**: $phaseName - [View](../$relativePath)"
            }
          }

          $wikiLines += @('', '## Components', '')
          if (Test-Path components) {
            Get-ChildItem -Path components -Directory | ForEach-Object {
              $relativePath = $_.FullName.Replace((Get-Location).Path, '').TrimStart([IO.Path]::DirectorySeparatorChar).Replace('\\', '/')
              $wikiLines += "- **$($_.Name)** - [View](../$relativePath)"
            }
          }

          New-Item -ItemType Directory -Force -Path docs | Out-Null
          $wikiLines | Out-File -FilePath docs/WIKI_INDEX.md -Encoding UTF8
          Write-Host "✅ Wiki documentation generated" -ForegroundColor Green

  update-status-badge:
    runs-on: ubuntu-latest
    name: Update Status Badge
    steps:
      - uses: actions/checkout@v4

      - name: Update README Status Badge
        shell: bash
        run: |
          set -euo pipefail
          echo "Updating status badges..."
          echo "✅ Documentation Up to Date"

  sync-to-wiki:
    runs-on: ubuntu-latest
    name: Sync Documentation to GitHub Wiki
    if: github.event_name == 'push'
    needs: [update-indexes, generate-wiki]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Checkout Wiki
        shell: bash
        run: git clone https://github.com/M0nado/helios-platform.wiki.git wiki

      - name: Copy Documentation to Wiki
        shell: bash
        run: |
          set -euo pipefail
          cp docs/*.md wiki/ 2>/dev/null || true
          cp phases/*/README.md wiki/ 2>/dev/null || true
          cp components/*/README.md wiki/ 2>/dev/null || true

      - name: Commit Wiki Changes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd wiki
          git add -A
          git commit -m "Auto-sync documentation from main repo" || true
          git push origin master || true
