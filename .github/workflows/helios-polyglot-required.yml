name: HELIOS Polyglot Required

on:
  pull_request:
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.fs"
      - "**/*.fsproj"
      - "**/*.cpp"
      - "**/*.hpp"
      - "**/CMakeLists.txt"
      - "**/*.py"
      - "HELIOS.Portable.slnx"
      - "services/helios-deployment-agent/**"
      - ".github/workflows/helios-polyglot-required.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.fs"
      - "**/*.fsproj"
      - "**/*.cpp"
      - "**/*.hpp"
      - "**/CMakeLists.txt"
      - "**/*.py"
      - "HELIOS.Portable.slnx"
      - "services/helios-deployment-agent/**"
      - ".github/workflows/helios-polyglot-required.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helios-polyglot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  portable-dotnet:
    name: C# + F# portable
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: Restore portable projects
        run: |
          dotnet restore tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj
          dotnet restore src/core/HELIOS.Platform.Minimal/HELIOS.Platform.csproj
      - name: Build portable projects
        run: |
          dotnet build tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
          dotnet build src/core/HELIOS.Platform.Minimal/HELIOS.Platform.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
      - name: Test F# analytics
        run: dotnet test tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj --configuration Release --no-build --logger "console;verbosity=normal"

  windows-dotnet:
    name: C# Windows/WPF
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: Restore Windows application
        run: dotnet restore src/core/HELIOS.Platform/HELIOS.Platform.csproj
      - name: Build Windows application
        run: dotnet build src/core/HELIOS.Platform/HELIOS.Platform.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

  native-cpp:
    name: C++20 native
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure native project
        run: cmake -S src/native/HELIOS.Native.Performance -B build/native -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build native project
        run: cmake --build build/native --config Release --parallel 2
      - name: Test native project
        run: ctest --test-dir build/native --build-config Release --output-on-failure

  python-policy:
    name: Python policy + evals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Compile deployment agent
        run: python -m compileall -q services/helios-deployment-agent/helios_deployment_agent services/helios-deployment-agent/evals
      - name: Test deterministic policy
        run: python -m unittest discover -s services/helios-deployment-agent/tests -v
      - name: Run offline policy evaluations
        run: python services/helios-deployment-agent/evals/run_local.py

  required:
    name: HELIOS CI / required
    if: always()
    needs:
      - portable-dotnet
      - windows-dotnet
      - native-cpp
      - python-policy
    runs-on: ubuntu-latest
    steps:
      - name: Enforce every required runtime
        env:
          PORTABLE_DOTNET: ${{ needs.portable-dotnet.result }}
          WINDOWS_DOTNET: ${{ needs.windows-dotnet.result }}
          NATIVE_CPP: ${{ needs.native-cpp.result }}
          PYTHON_POLICY: ${{ needs.python-policy.result }}
        run: |
          for result in "$PORTABLE_DOTNET" "$WINDOWS_DOTNET" "$NATIVE_CPP" "$PYTHON_POLICY"; do
            if [ "$result" != "success" ]; then
              echo "Required runtime did not succeed: $result" >&2
              exit 1
            fi
          done
