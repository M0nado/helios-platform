name: HELIOS Polyglot Required

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helios-polyglot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  portable-dotnet:
    name: C# + F# portable
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: Restore portable projects
        run: |
          dotnet restore tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj
          dotnet restore src/core/HELIOS.Platform.Minimal/HELIOS.Platform.csproj
      - name: Build portable projects
        run: |
          dotnet build tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
          dotnet build src/core/HELIOS.Platform.Minimal/HELIOS.Platform.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
      - name: Test F# analytics
        run: dotnet test tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj --configuration Release --no-build --logger "console;verbosity=normal"

  windows-dotnet:
    name: C# Windows/WPF
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: Restore Windows application
        run: dotnet restore src/core/HELIOS.Platform/HELIOS.Platform.csproj
      - name: Build Windows application
        run: dotnet build src/core/HELIOS.Platform/HELIOS.Platform.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

  native-cpp:
    name: C++20 native
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Configure native project
        run: cmake -S src/native/HELIOS.Native.Performance -B build/native -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build native project
        run: cmake --build build/native --config Release --parallel 2
      - name: Test native project
        run: ctest --test-dir build/native --build-config Release --output-on-failure

  python-policy:
    name: Python policy + evals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate automation route contract
        run: |
          python scripts/control/validate_automation_routes.py
          python -m unittest discover -s scripts/control/tests -p "test_validate_automation_routes.py" -v
      - name: Install locked deployment agent
        run: |
          python -m pip install --disable-pip-version-check uv==0.9.25
          uv sync --frozen --no-dev --project services/helios-deployment-agent
      - name: Enforce automation JSON Schema
        run: |
          services/helios-deployment-agent/.venv/bin/python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          schema = json.loads(Path("schemas/automation-routes-v1.schema.json").read_text())
          registry = json.loads(Path("config/HELIOS_AUTOMATION_ROUTES_V1.json").read_text())
          Draft202012Validator.check_schema(schema)
          Draft202012Validator(schema).validate(registry)
          PY
      - name: Compile deployment agent
        run: services/helios-deployment-agent/.venv/bin/python -m compileall -q services/helios-deployment-agent/helios_deployment_agent services/helios-deployment-agent/evals
      - name: Validate SDK and API imports
        run: services/helios-deployment-agent/.venv/bin/python -c "from helios_deployment_agent.agent import planning_agent; from helios_deployment_agent.main import app; assert planning_agent.name and app.title"
      - name: Test policy and HTTP boundary
        run: services/helios-deployment-agent/.venv/bin/python -m unittest discover -s services/helios-deployment-agent/tests -v
      - name: Run offline policy evaluations
        run: services/helios-deployment-agent/.venv/bin/python services/helios-deployment-agent/evals/run_local.py
      - name: Check locked environment
        run: uv pip check --python services/helios-deployment-agent/.venv/bin/python
      - name: Build deployment-agent container
        run: docker build --tag helios-deployment-agent:ci services/helios-deployment-agent
      - name: Smoke deployment-agent container
        run: |
          set -euo pipefail
          docker run --detach --name helios-deployment-agent-ci \
            --publish 127.0.0.1:8080:8080 \
            --env OPENAI_API_KEY=ci-presence-check-only \
            --env HELIOS_PLANNER_BEARER_TOKEN=ci-local-check-only \
            helios-deployment-agent:ci
          trap 'docker logs helios-deployment-agent-ci; docker rm --force helios-deployment-agent-ci' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health/live >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:8080/health/ready >/dev/null
          test "$(docker inspect --format '{{.Config.User}}' helios-deployment-agent-ci)" = "10001:10001"

  required:
    name: HELIOS CI / required
    if: always()
    needs:
      - portable-dotnet
      - windows-dotnet
      - native-cpp
      - python-policy
    runs-on: ubuntu-latest
    steps:
      - name: Enforce every required runtime
        env:
          PORTABLE_DOTNET: ${{ needs.portable-dotnet.result }}
          WINDOWS_DOTNET: ${{ needs.windows-dotnet.result }}
          NATIVE_CPP: ${{ needs.native-cpp.result }}
          PYTHON_POLICY: ${{ needs.python-policy.result }}
        run: |
          for result in "$PORTABLE_DOTNET" "$WINDOWS_DOTNET" "$NATIVE_CPP" "$PYTHON_POLICY"; do
            if [ "$result" != "success" ]; then
              echo "Required runtime did not succeed: $result" >&2
              exit 1
            fi
          done
