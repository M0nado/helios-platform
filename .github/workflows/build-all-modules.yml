name: Build All Modules

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (no cache)'
        required: false
        default: 'false'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.setup.outputs.modules }}
      node-version: ${{ steps.setup.outputs.node-version }}
      has-modules: ${{ steps.setup.outputs.has-modules }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Build Configuration
        id: setup
        run: |
          # Discover buildable Node.js modules instead of assuming fixed top-level directories.
          mapfile -t MODULE_DIRS < <(find . -maxdepth 3 -name package.json -not -path './node_modules/*' -printf '%h\n' | sed 's#^./##' | sort)

          if [ ${#MODULE_DIRS[@]} -eq 0 ]; then
            MODULES='["__no_node_modules__"]'
            HAS_MODULES=false
            echo "No Node.js modules with package.json were found; build matrix will be skipped."
          else
            MODULES=$(printf '%s\n' "${MODULE_DIRS[@]}" | jq -R . | jq -cs .)
            HAS_MODULES=true
            echo "Discovered Node.js modules: $MODULES"
          fi

          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "node-version=18" >> $GITHUB_OUTPUT
          echo "has-modules=$HAS_MODULES" >> $GITHUB_OUTPUT
          echo "Build matrix configured"

  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.has-modules == 'true'
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Setup NPM Build Cache
        if: github.event.inputs.clean_build != 'true' && hashFiles(format('{0}/package-lock.json', matrix.module)) != ''
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.module }}/node_modules
            ${{ matrix.module }}/dist
            ${{ matrix.module }}/build
            ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.module }}-${{ hashFiles(format('{0}/package-lock.json', matrix.module)) }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.module }}-
            ${{ runner.os }}-npm-

      - name: Display Environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Module: ${{ matrix.module }}"
          echo "Clean build: ${{ github.event.inputs.clean_build }}"

      - name: Install Dependencies
        run: |
          cd ${{ matrix.module }}
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit
          else
            npm install --prefer-offline --no-audit
          fi

      - name: Lint Code
        continue-on-error: true
        run: |
          cd ${{ matrix.module }}
          if [ -f "package.json" ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script found"
          fi

      - name: Build Module
        run: |
          cd ${{ matrix.module }}
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script found"
          fi

      - name: Run Tests
        run: |
          cd ${{ matrix.module }}
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --coverage --passWithNoTests
          else
            echo "No test script found"
          fi

      - name: Generate Coverage Report
        if: always()
        run: |
          cd ${{ matrix.module }}
          if [ -d "coverage" ]; then
            echo "Coverage report generated"
            find coverage -name "*.json" -o -name "*.html" | head -10
          fi

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/dist/
            ${{ matrix.module }}/build/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage/
          if-no-files-found: warn
          retention-days: 7

  verify-builds:
    name: Verify Build Integrity
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: always()
    steps:
      - name: Download All Artifacts
        if: needs.setup.outputs.has-modules == 'true'
        uses: actions/download-artifact@v4
        with:
          path: build-results

      - name: Verify Artifacts
        run: |
          if [ "${{ needs.setup.outputs.has-modules }}" != "true" ]; then
            echo "No Node.js module artifacts to verify."
            exit 0
          fi
          echo "Verifying build artifacts..."
          find build-results -type f \( -name "*.json" -o -name "*.js" \) | wc -l
          echo "✓ Build verification complete"

      - name: Generate Build Report
        run: |
          echo "## Build All Modules Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Modules Built" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.setup.outputs.modules }}' | jq -r '.[] | select(. != "__no_node_modules__") | "- " + .' >> $GITHUB_STEP_SUMMARY

  report-status:
    name: Report Build Status
    runs-on: ubuntu-latest
    needs: [setup, build, verify-builds]
    if: always()
    steps:
      - name: Check Build Status
        run: |
          if [ "${{ needs.setup.outputs.has-modules }}" != "true" ]; then
            echo "✓ No Node.js modules were found, so the module build matrix was skipped"
            exit 0
          elif [ "${{ needs.build.result }}" == "success" ]; then
            echo "✓ All modules built successfully"
            exit 0
          else
            echo "✗ Build failed for one or more modules"
            exit 1
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const hasModules = '${{ needs.setup.outputs.has-modules }}' === 'true';
            const status = !hasModules || '${{ needs.build.result }}' === 'success' ? '✓' : '✗';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${status} Build All Modules\n\n**Status**: ${{ needs.setup.outputs.has-modules != 'true' && 'skipped - no Node.js modules found' || needs.build.result }}\n\n[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
