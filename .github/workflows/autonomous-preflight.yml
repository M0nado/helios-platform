name: HELIOS Autonomous Preflight

on:
  pull_request:
  push:
    branches: [work, main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: npm run preflight
