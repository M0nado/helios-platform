name: HELIOS Platform  Build, Test & Deploy

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]
              schedule:
                  - cron: '0 3 * * 1'   # Weekly Codex weight optimizer (Monday 3am UTC)
                    workflow_dispatch:
                        inputs:
                              work_item_id:
                                      description: Azure Boards work item to implement
                                              required: false

                                              permissions:
                                                id-token: write
                                                  contents: write
                                                    pull-requests: write

                                                    env:
                                                      ACR_NAME: heliosacr
                                                        APP_NAME: helios-platform
                                                          RG_NAME: helios-rg
                                                            IMAGE_TAG: ${{ github.sha }}

                                                            jobs:

                                                              build:
                                                                  name: Build + Test
                                                                      runs-on: ubuntu-latest
                                                                          steps:
                                                                                - uses: actions/checkout@v4
                                                                                      - name: Setup .NET 8
                                                                                              uses: actions/setup-dotnet@v4
                                                                                                      with:
                                                                                                                dotnet-version: '8.0.x'
                                                                                                                      - name: Setup Python 3.12
                                                                                                                              uses: actions/setup-python@v5
                                                                                                                                      with:
                                                                                                                                                python-version: '3.12'
                                                                                                                                                          cache: 'pip'
                                                                                                                                                                - name: Restore & Build .NET
                                                                                                                                                                        run: |
                                                                                                                                                                                  dotnet restore src/AIHub/AIHub.csproj
                                                                                                                                                                                            dotnet build src/AIHub/AIHub.csproj -c Release --no-restore
                                                                                                                                                                                                  - name: Run .NET Tests
                                                                                                                                                                                                          run: dotnet test src/AIHub.Tests/ -c Release --no-build --logger "trx"
                                                                                                                                                                                                                - name: Install Python deps
                                                                                                                                                                                                                        run: pip install -r scripts/requirements.txt
                                                                                                                                                                                                                              - name: Run Python Agent Tests
                                                                                                                                                                                                                                      run: python -m pytest scripts/tests/ -v --tb=short
                                                                                                                                                                                                                                            - name: Hermes Fleet Readiness Pre-check
                                                                                                                                                                                                                                                    run: python scripts/hermes_fleet_readiness.py --check-only
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                      codex-review:
                                                                                                                                                                                                                                                          name: Codex Linux Compat Review
                                                                                                                                                                                                                                                              needs: build
                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                      if: github.event_name == 'pull_request'
                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                      - uses: openai/codex-action@v1
                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                        openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                                                                                                                                                                                                                                                                                                                  prompt: |
                                                                                                                                                                                                                                                                                                                              Review all changed files for Windows-only APIs, net8.0-windows TFM,
                                                                                                                                                                                                                                                                                                                                          security issues, Hermes fleet correctness, and Azure SDK patterns.
                                                                                                                                                                                                                                                                                                                                                      Post structured review: Linux Compat | Security | Hermes | Looks Good
                                                                                                                                                                                                                                                                                                                                                                sandbox: read-only
                                                                                                                                                                                                                                                                                                                                                                          effort: medium
                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                            containerize:
                                                                                                                                                                                                                                                                                                                                                                                name: Build & Push Docker Image
                                                                                                                                                                                                                                                                                                                                                                                    needs: build
                                                                                                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                            if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
                                                                                                                                                                                                                                                                                                                                                                                                outputs:
                                                                                                                                                                                                                                                                                                                                                                                                      image-uri: ${{ steps.push.outputs.image-uri }}
                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                      - uses: azure/login@v2
                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                        client-id: ${{ secrets.AZURE_CLIENT_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Build & Push to ACR
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          id: push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            az acr login --name $ACR_NAME
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      IMAGE="$ACR_NAME.azurecr.io/helios-platform:$IMAGE_TAG"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                docker build -t $IMAGE -t "$ACR_NAME.azurecr.io/helios-platform:latest" .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          docker push $IMAGE
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    docker push "$ACR_NAME.azurecr.io/helios-platform:latest"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "image-uri=$IMAGE" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                deploy:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: Deploy to Azure Linux App Service
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        needs: containerize
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                environment: production
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - uses: azure/login@v2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            client-id: ${{ secrets.AZURE_CLIENT_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Update App Service container
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        az webapp config container set \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --name $APP_NAME --resource-group $RG_NAME \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --docker-custom-image-name ${{ needs.containerize.outputs.image-uri }} \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            --docker-registry-server-url "https://$ACR_NAME.azurecr.io"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Warm-up Hermes Fleet
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    curl -X POST https://$APP_NAME.azurewebsites.net/api/hermes/fleet/warmup \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -H "Authorization: Bearer ${{ secrets.HELIOS_API_KEY }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -d '{"agents": 8, "mode": "gepa"}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Post Slack deploy notification
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    curl -X POST https://$APP_NAME.azurewebsites.net/slack/notify \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -H "Authorization: Bearer ${{ secrets.HELIOS_API_KEY }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -H "Content-Type: application/json" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -d '{"event_type":"deploy","sha":"${{ github.sha }}","env":"production"}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          codex-hermes-optimize:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              name: Codex Hermes Weight Optimizer
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if: github.event_name == 'schedule'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - uses: openai/codex-action@v1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  prompt: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              Read config/hermes_fleet.json and logs/hermes_signals.jsonl.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Apply GEPA gradient estimation to compute updated agent weights.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Agents with outcome score > 0.75 flagged for retraining.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  Write updated weights to config/hermes_fleet.json.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              Write summary to docs/hermes_weight_report.md.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Commit and open PR: "chore: Hermes xcore weight update [auto]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    sandbox: workspace-write
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              effort: high
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Post Hermes digest to Slack
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              curl -X POST https://$APP_NAME.azurewebsites.net/slack/notify \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -H "Authorization: Bearer ${{ secrets.HELIOS_API_KEY }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -H "Content-Type: application/json" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  -d '{"event_type":"hermes","channel":"helios-alerts","trigger":"weekly-optimizer"}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    codex-implement:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: Codex Implement Work Item
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: github.event_name == 'workflow_dispatch' && github.event.inputs.work_item_id != ''
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - uses: openai/codex-action@v1# HELIOS Platform  Unified Pipeline Scaffold
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Full workflow added via open-pr.sh  see feat/unified-pipeline-scaffold branch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Jobs: build, codex-review, containerize, boards-sync, deploy, codex-hermes-optimize, codex-implement
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: Plan & Implement
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    prompt: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Fetch work item AB#${{ github.event.inputs.work_item_id }} from Azure DevOps.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Write implementation plan to PLAN.md.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Implement every step, run tests, open PR when all pass.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    Title: "feat: AB#${{ github.event.inputs.work_item_id }} [codex-auto]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              sandbox: workspace-write
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        effort: high
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
