name: HELIOS Control Plane

on:
  workflow_dispatch:
    inputs:
      publish_pages:
        description: 'Publish GitHub Pages dashboard'
        required: false
        default: 'false'
      update_wiki:
        description: 'Generate wiki export artifact'
        required: false
        default: 'false'
      run_full_tests:
        description: 'Run full available tests'
        required: false
        default: 'true'
  push:
    branches: [ main, develop, work ]
    paths:
      - 'scripts/**'
      - 'src/analytics/**'
      - 'src/core/HELIOS.Platform.Contracts/**'
      - 'src/native/**'
      - 'tests/analytics/**'
      - 'infra/**'
      - '.github/workflows/helios-control-plane.yml'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Branch intelligence
        run: python3 scripts/analysis/branch_intelligence.py
      - name: Generate graphs
        run: python3 scripts/graphs/generate_graphs.py
      - name: Wiki export
        if: ${{ github.event.inputs.update_wiki == 'true' }}
        run: python3 scripts/github/update-wiki-from-reports.py
      - name: Build analytics projects
        run: dotnet build tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj
      - name: Test analytics projects
        if: ${{ github.event.inputs.run_full_tests != 'false' }}
        run: dotnet test tests/analytics/HELIOS.Analytics.FSharp.Tests/HELIOS.Analytics.FSharp.Tests.fsproj --no-build
      - name: Native/XCore configure validation
        run: cmake -S src/native/HELIOS.Native.Performance -B .build/native
      - name: Stage status site
        run: |
          mkdir -p status-site/reports
          cp reports/branch-intelligence/*.md status-site/reports/
      - uses: actions/upload-artifact@v4
        with:
          name: helios-control-plane
          path: |
            reports/branch-intelligence/
            status-site/
          retention-days: 30
      - name: Upload Pages artifact
        if: ${{ github.event.inputs.publish_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: status-site

  deploy-pages:
    if: ${{ github.event.inputs.publish_pages == 'true' }}
    needs: intelligence
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
