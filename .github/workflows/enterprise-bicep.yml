name: HELIOS enterprise Bicep

on:
  pull_request:
    paths:
      - 'infra/bicep/**'
      - '.github/workflows/enterprise-bicep.yml'
  workflow_dispatch:
    inputs:
      environment_name:
        required: true
        type: choice
        options: [dev, test, prod]
      apply:
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-bicep@v2
      - name: Build Bicep
        run: bicep build infra/bicep/enterprise/main.bicep --outfile main.json
      - uses: actions/upload-artifact@v4
        with:
          name: enterprise-bicep
          path: main.json

  what-if:
    if: github.event_name == 'workflow_dispatch'
    needs: compile
    runs-on: ubuntu-latest
    environment: helios-${{ inputs.environment_name }}-what-if
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Azure what-if
        run: >-
          az deployment group what-if
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --template-file infra/bicep/enterprise/main.bicep
          --parameters environmentName="${{ inputs.environment_name }}"

  deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.apply
    needs: what-if
    runs-on: [self-hosted, linux, x64, helios-azure]
    environment: helios-${{ inputs.environment_name }}-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy approved template
        run: >-
          az deployment group create
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --template-file infra/bicep/enterprise/main.bicep
          --parameters environmentName="${{ inputs.environment_name }}"
