name: Security Audit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret pattern scan
        shell: pwsh
        run: ./scripts/security/scan-secrets.ps1
      - name: .NET dependency audit
        shell: pwsh
        run: ./scripts/security/audit-dependencies.ps1
