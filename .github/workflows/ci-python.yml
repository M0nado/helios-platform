name: CI - Python

on:
  pull_request:
    paths:
      - 'src/python/**'
      - '.github/workflows/ci-python.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - src/python/helios_aihub
          - src/python/hermes_xcore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e '${{ matrix.package }}'
      - name: Import check
        run: python - <<'PY'
import importlib
for name in ('helios_aihub', 'hermes_xcore'):
    try:
        print(importlib.import_module(name).describe())
    except ModuleNotFoundError:
        pass
PY
