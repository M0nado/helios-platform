name: HELIOS Control App
on:
  pull_request:
    paths:
      - 'apps/helios-control/**'
      - 'plugins/helios-azure-cli/**'
      - '.agents/plugins/marketplace.json'
      - '.github/workflows/helios-control-app.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/helios-control
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/helios-control/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run smoke
      - run: docker build -t helios-control:test .
  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m json.tool plugins/helios-azure-cli/.codex-plugin/plugin.json
      - run: python -m json.tool plugins/helios-azure-cli/assets/helios-targets.json
      - run: python -m unittest discover -s plugins/helios-azure-cli/scripts -p 'test_*.py'
      - run: python plugins/helios-azure-cli/scripts/helios_azure.py --help
