name: Validate Monadoblade profile contracts

on:
  pull_request:
    paths:
      - 'config/profiles/monadoblade-profiles.v1.json'
      - 'config/storage/monadoblade-*.json'
      - 'config/software/monadoblade-profile-software.v1.json'
      - 'config/gui/monado-profile-shell.v1.json'
      - 'config/aihub/profile-optimization-policies.v1.json'
      - 'config/automation/monadoblade-14-script-manifest.v1.json'
      - 'config/runtime/helios-fabric-services.v1.json'
      - 'docs/architecture/MONADOBLADE_PROFILE_STORAGE_GUI_SYSTEM.md'
      - '.github/workflows/validate-monadoblade-profile-contracts.yml'
  push:
    branches:
      - main
    paths:
      - 'config/profiles/monadoblade-profiles.v1.json'
      - 'config/storage/monadoblade-*.json'
      - 'config/software/monadoblade-profile-software.v1.json'
      - 'config/gui/monado-profile-shell.v1.json'
      - 'config/aihub/profile-optimization-policies.v1.json'
      - 'config/automation/monadoblade-14-script-manifest.v1.json'
      - 'config/runtime/helios-fabric-services.v1.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-contracts:
    name: Validate JSON and safety invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Parse JSON contracts
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = [
              Path('config/profiles/monadoblade-profiles.v1.json'),
              Path('config/storage/monadoblade-partitions.2x2tb.v1.json'),
              Path('config/storage/monadoblade-folder-hierarchy.v1.json'),
              Path('config/software/monadoblade-profile-software.v1.json'),
              Path('config/gui/monado-profile-shell.v1.json'),
              Path('config/aihub/profile-optimization-policies.v1.json'),
              Path('config/automation/monadoblade-14-script-manifest.v1.json'),
              Path('config/runtime/helios-fabric-services.v1.json'),
          ]
          for path in paths:
              if not path.exists():
                  raise SystemExit(f'Missing required contract: {path}')
              with path.open('r', encoding='utf-8') as handle:
                  json.load(handle)
              print(f'valid: {path}')
          PY

      - name: Enforce profile invariants
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('config/profiles/monadoblade-profiles.v1.json').read_text(encoding='utf-8'))
          profiles = data['profiles']
          ids = [p['id'] for p in profiles]
          expected = {'developer', 'sysadmin', 'sysops', 'gamer', 'studio', 'personal', 'server-background'}
          if set(ids) != expected:
              raise SystemExit(f'Profile set mismatch: {set(ids)}')
          if len(ids) != len(set(ids)):
              raise SystemExit('Duplicate profile IDs')
          admins = [p for p in profiles if p.get('admin')]
          if [p['id'] for p in admins] != ['sysadmin']:
              raise SystemExit('SysAdmin must be the only administrator profile')
          sysadmin = admins[0]
          activation = sysadmin.get('activation', {})
          required = ['physicalPresenceRequired', 'remoteActivationDenied', 'cloudActivationDenied', 'aiActivationDenied']
          if not all(activation.get(key) is True for key in required):
              raise SystemExit('SysAdmin physical/local activation boundary is incomplete')
          if activation.get('minimumFactors', 0) < 2:
              raise SystemExit('SysAdmin requires at least two local factors')
          print('profile invariants passed')
          PY

      - name: Enforce storage guardrails
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('config/storage/monadoblade-partitions.2x2tb.v1.json').read_text(encoding='utf-8'))
          if data.get('destructiveApplyDefault') is not False:
              raise SystemExit('Destructive apply must default to false')
          if data.get('requireWhatIf') is not True:
              raise SystemExit('Storage layout must require what-if')
          guardrails = data.get('guardrails', {})
          required = [
              'neverClearDiskWithoutExactIdentity',
              'neverFormatSystemOrBootDisk',
              'neverDeleteOemRecoveryAutomatically',
              'requireBackupEvidenceBeforeApply',
              'requireBitLockerRecoveryEvidence',
          ]
          if not all(guardrails.get(key) is True for key in required):
              raise SystemExit('Storage guardrails are incomplete')
          workload = next(d for d in data['disks'] if d['diskRole'] == 'workload')
          labels = {p['label'] for p in workload['partitions']}
          expected = {'MONADO_DEV', 'MONADO_AI_MODELS', 'MONADO_SECURE', 'MONADO_QUARANTINE', 'MONADO_BACKUP'}
          if labels != expected:
              raise SystemExit(f'Workload volume mismatch: {labels}')
          print('storage invariants passed')
          PY

      - name: Enforce AIHub and automation safety
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          aihub = json.loads(Path('config/aihub/profile-optimization-policies.v1.json').read_text(encoding='utf-8'))
          brain = aihub['brain']
          required_brain = [
              'denySecretReadback',
              'denyUnboundedShell',
              'denySelfPrivilegeEscalation',
              'requireHumanApprovalForExternalWrites',
          ]
          if brain.get('autonomousAdministrator') is not False:
              raise SystemExit('AIHub cannot be an autonomous administrator')
          if not all(brain.get(key) is True for key in required_brain):
              raise SystemExit('AIHub safety invariants are incomplete')

          automation = json.loads(Path('config/automation/monadoblade-14-script-manifest.v1.json').read_text(encoding='utf-8'))
          scripts = automation['scripts']
          if len(scripts) != 14:
              raise SystemExit(f'Expected 14 governed scripts, found {len(scripts)}')
          if automation.get('rawExecutionDenied') is not True:
              raise SystemExit('Raw script execution must be denied')
          if automation.get('defaultMode') != 'plan':
              raise SystemExit('Automation must default to plan mode')
          if not all('risk' in item and 'applyRequires' in item for item in scripts):
              raise SystemExit('Every script must declare risk and apply gates')
          print('AIHub and automation invariants passed')
          PY

      - name: Secret-pattern scan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          roots = [Path('config'), Path('docs/architecture')]
          patterns = [
              re.compile(r'sk-[A-Za-z0-9_-]{20,}'),
              re.compile(r'github_pat_[A-Za-z0-9_]{20,}'),
              re.compile(r'(?i)(client_secret|api_key|access_token)\s*[:=]\s*["\'][^"\']{12,}["\']'),
          ]
          for root in roots:
              for path in root.rglob('*'):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  for pattern in patterns:
                      if pattern.search(text):
                          raise SystemExit(f'Potential secret in {path}: {pattern.pattern}')
          print('no secret patterns detected')
          PY
