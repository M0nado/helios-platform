name: NuGet Build & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_nuget:
        description: 'Publish to NuGet.org'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0', '7.0', '6.0']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build src/HELIOS.Platform/HELIOS.Platform.csproj -c Release -f net${{ matrix.dotnet-version }} --no-restore -v minimal

      - name: Run tests
        run: dotnet test tests/ -c Release --no-build --logger "trx;LogFileName=test-results.trx" --verbosity minimal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
          path: '**/test-results.trx'

  package:
    needs: build
    runs-on: windows-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Get version
        id: version
        run: |
          [xml]$csproj = Get-Content "src/HELIOS.Platform/HELIOS.Platform.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $version"

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet pack src/HELIOS.Platform/HELIOS.Platform.csproj -c Release -o artifacts/

      - name: Verify package
        run: |
          Get-ChildItem artifacts/*.nupkg | ForEach-Object {
            Write-Host "Package created: $($_.Name)"
            Write-Host "Size: $(($_.Length / 1MB).ToString('F2')) MB"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v3
        with:
          name: nuget-package-${{ steps.version.outputs.VERSION }}
          path: artifacts/*.nupkg
          retention-days: 30

