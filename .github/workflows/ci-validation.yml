name: CI - Code Validation & Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    name: PowerShell Syntax Validation
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: Verify PowerShell
        run: $PSVersionTable.PSVersion
        shell: pwsh
      
      - name: Check PowerShell Syntax
        shell: pwsh
        run: |
          $failures = 0
          Get-ChildItem -Path '.' -Filter '*.ps1' -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            $file = $_.FullName
            Write-Host "Checking: $file"
            try {
              $content = Get-Content -Path $file -Raw
              [scriptblock]::Create($content) | Out-Null
              Write-Host "✅ OK" -ForegroundColor Green
            } catch {
              Write-Host "❌ FAILED: $_" -ForegroundColor Red
              $failures++
            }
          }
          if ($failures -gt 0) {
            Write-Host "Syntax check failed for $failures files" -ForegroundColor Red
            exit 1
          }

  markdown-check:
    runs-on: ubuntu-latest
    name: Markdown Validation
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: Run markdownlint
        uses: nosborn/github-action-markdown-cli@508d6cefd8f0cc99eab5d2d4685b1d5f470042c1 # v3.5.0
        with:
          files: .
          config_file: .markdownlint.json
        continue-on-error: true

  documentation-check:
    runs-on: ubuntu-latest
    name: Documentation Completeness
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: Check Required Documentation
        run: |
          required_docs=(
            "README.md"
          )
          
          missing=0
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "❌ Missing required documentation: $doc"
              missing=$((missing + 1))
            else
              echo "✅ Found: $doc"
            fi
          done
          
          if [ $missing -eq 0 ]; then
            echo "✅ All required documentation present!"
          else
            echo "⚠️  Some documentation missing (non-blocking)"
          fi

  test-scripts:
    runs-on: ubuntu-latest
    name: Test PowerShell Scripts
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: Verify PowerShell
        run: $PSVersionTable.PSVersion
        shell: pwsh
      
      - name: Run Unit Tests
        run: |
          if (Test-Path -Path "src/tests" -ErrorAction SilentlyContinue) {
            Get-ChildItem -Path "src/tests" -Filter "*.tests.ps1" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Running: $($_.FullName)" -ForegroundColor Cyan
              & $_.FullName
            }
          } else {
            Write-Host "No tests directory found" -ForegroundColor Yellow
          }
        shell: pwsh
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  file-integrity:
    runs-on: ubuntu-latest
    name: File Structure Validation
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: Validate Directory Structure
        run: |
          required_dirs=(
            "src"
            "docs"
          )
          
          missing=0
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing required directory: $dir"
              missing=$((missing + 1))
            else
              echo "✅ Found: $dir"
            fi
          done
          
          if [ $missing -eq 0 ]; then
            echo "✅ Directory structure is valid!"
          else
            exit 1
          fi

  validation-summary:
    name: Validation Summary
    if: always()
    needs: [syntax-check, markdown-check, documentation-check, test-scripts, security-scan, file-integrity]
    runs-on: ubuntu-latest
    steps:
      - name: Report Status
        env:
          DOCUMENTATION: ${{ needs.documentation-check.result }}
          FILE_INTEGRITY: ${{ needs.file-integrity.result }}
          MARKDOWN: ${{ needs.markdown-check.result }}
          SCRIPT_TESTS: ${{ needs.test-scripts.result }}
          SECURITY_SCAN: ${{ needs.security-scan.result }}
          SYNTAX: ${{ needs.syntax-check.result }}
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Syntax Check: $SYNTAX" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown Check: $MARKDOWN" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation: $DOCUMENTATION" >> $GITHUB_STEP_SUMMARY
          echo "- Script Tests: $SCRIPT_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: $SECURITY_SCAN" >> $GITHUB_STEP_SUMMARY
          echo "- File Integrity: $FILE_INTEGRITY" >> $GITHUB_STEP_SUMMARY

          for result in "$SYNTAX" "$MARKDOWN" "$DOCUMENTATION" "$SCRIPT_TESTS" "$SECURITY_SCAN" "$FILE_INTEGRITY"; do
            if [ "$result" != "success" ]; then
              echo "One or more validation jobs did not succeed." >&2
              exit 1
            fi
          done
