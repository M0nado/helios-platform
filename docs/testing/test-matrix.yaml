test_matrix:
  dotnet:
    paths: [src/core, src/frontend, src/security]
    workflow: .github/workflows/ci-dotnet.yml
  native:
    paths: [src/native]
    workflow: .github/workflows/ci-native.yml
  python:
    paths: [src/python]
    workflow: .github/workflows/ci-python.yml
  security:
    paths: [docs/security, scripts/security, tests/security]
    workflow: .github/workflows/security-audit.yml
  docs:
    paths: [docs]
    workflow: .github/workflows/ci-docs.yml
