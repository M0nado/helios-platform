    git_remote_name: helios-dev-ai-hub
    git_remote_url_or_local_path: https://github.com/M0nado/helios-dev-ai-hub.git
    submodule_path: modules/helios-dev-ai-hub
    target_branch: main
    source_branch: main
    merge_order: 6
    consolidation_mode: submodule
    primary_areas:
      - python_ai_hub
      - development_ai_workflows
      - experimentation
    conflict_resolution_owner_by_area:
      csharp_winui: helios-control
      cpp_backend: helios-monado-blade
      fsharp_analytics: hermes-fleet-production
      python_ai_hub: helios-ai-hub
      azure_github_automation: helios-build-agents

  - id: helios-build-agents
    kind: external_repository
    git_remote_name: helios-build-agents
    git_remote_url_or_local_path: https://github.com/M0nado/helios-build-agents.git
    submodule_path: modules/helios-build-agents
    target_branch: main
    source_branch: main
    merge_order: 7
    consolidation_mode: submodule
    primary_areas:
      - azure_github_automation
      - azure_cli
      - github_actions
      - cicd
    conflict_resolution_owner_by_area:
      csharp_winui: helios-control
      cpp_backend: helios-monado-blade
      fsharp_analytics: hermes-fleet-production
      python_ai_hub: helios-ai-hub
      azure_github_automation: helios-build-agents
    notes: "Primary owner for Azure CLI setup, GitHub automation, agent build pipelines, and deployment workflow consolidation."

  - id: helios-gui-framework
    kind: external_repository
    git_remote_name: helios-gui-framework
    git_remote_url_or_local_path: https://github.com/M0nado/helios-gui-framework.git
    submodule_path: modules/helios-gui-framework
    target_branch: main
    source_branch: main
    merge_order: 8
    consolidation_mode: submodule
    primary_areas:
      - csharp_winui
      - gui_framework
      - shared_ui_components
    conflict_resolution_owner_by_area:
      csharp_winui: helios-control
      cpp_backend: helios-monado-blade
      fsharp_analytics: hermes-fleet-production
      python_ai_hub: helios-ai-hub
      azure_github_automation: helios-build-agents

  - id: helios-software-stack
    kind: external_repository
    git_remote_name: helios-software-stack
    git_remote_url_or_local_path: https://github.com/M0nado/helios-software-stack.git
    submodule_path: modules/helios-software-stack
    target_branch: main
    source_branch: main
    merge_order: 9
    consolidation_mode: submodule
    primary_areas:
      - toolchain
      - installer
      - azure_cli
      - developer_setup
    conflict_resolution_owner_by_area:
      csharp_winui: helios-control
      cpp_backend: helios-monado-blade
      fsharp_analytics: hermes-fleet-production
      python_ai_hub: helios-ai-hub
      azure_github_automation: helios-build-agents
verification:
  configured_remotes_required:
    - origin
    - helios-control
    - hermes-fleet-production
    - helios-monado-blade
    - helios-security-setup
    - helios-ai-hub
    - helios-dev-ai-hub
    - helios-build-agents
    - helios-gui-framework
    - helios-software-stack
  submodule_entries_required:
    - modules/helios-control
    - modules/hermes-fleet-production
    - modules/helios-monado-blade
    - modules/helios-security-setup
    - modules/helios-ai-hub
    - modules/helios-dev-ai-hub
    - modules/helios-build-agents
    - modules/helios-gui-framework
    - modules/helios-software-stack
  expected_branch_listing_note: "git branch --all must include local integration branch work; remote-tracking branches appear after network access allows git fetch --all --prune."
