# HELIOS Platform Configuration Template
# Uncomment and modify as needed

# Security Configuration
security:
  mfa_enabled: true
  min_password_length: 12
  session_timeout_minutes: 30
  session_access_mode: full-read-write
  read_enabled: true
  write_enabled: true
  merge_requires_review: true

# Optimization Settings
optimization:
  enable_profiling: true
  auto_tune: true

# Cloud Settings
cloud:
  enable_azure: true
  cli_required: true
  region: 'eastus'
